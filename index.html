<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品富文本生成器</title>
<style>
  :root {
    --bg: #f5f3ef;
    --card: #ffffff;
    --text: #2c2416;
    --muted: #8b7355;
    --accent: #8b6f5e;
    --border: #e0d6c8;
    --input-bg: #fdfaf6;
    --tag-bg: #f0e8db;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .badge { font-size: 12px; color: var(--muted); background: var(--tag-bg); padding: 4px 10px; border-radius: 12px; }

  /* Layout */
  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    padding: 24px 32px;
    max-width: 1600px;
    margin: 0 auto;
    height: calc(100vh - 65px);
  }

  /* Panel */
  .panel {
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  /* Form */
  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field textarea, .field input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    font-family: inherit;
    background: var(--input-bg);
    color: var(--text);
    resize: vertical;
    transition: border-color 0.2s;
  }
  .field textarea:focus, .field input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(139,111,94,0.1);
  }
  .field textarea { min-height: 80px; }
  .field .hint { font-size: 11px; color: #aaa; margin-top: 3px; }

  /* Image URLs section */
  .img-urls { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
  .img-urls h3 { font-size: 13px; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .img-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .img-row .img-label { font-size: 11px; color: var(--muted); width: 50px; flex-shrink: 0; text-align: right; }
  .img-row input { flex: 1; }

  /* Buttons */
  .btn-row { display: flex; gap: 10px; margin-top: 20px; }
  .btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { opacity: 0.9; }
  .btn.danger { color: #c0392b; border-color: #e8c8c4; }

  /* Output */
  .output-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
  .output-tab {
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .output-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .output-content { display: none; padding: 0; flex: 1; overflow: hidden; }
  .output-content.active { display: flex; flex-direction: column; }

  .code-block {
    flex: 1;
    overflow-y: auto;
    background: #1e1b18;
    color: #e8dcc8;
    font-family: "SF Mono", "Menlo", "Monaco", monospace;
    font-size: 12px;
    line-height: 1.6;
    padding: 16px;
    border-radius: 0;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .preview-frame {
    flex: 1;
    border: none;
    width: 100%;
    height: 100%;
  }

  .copy-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: #fdfaf6;
  }
  .copy-bar .status { font-size: 12px; color: var(--muted); }
  .copy-bar .copied { color: #27ae60; font-weight: 600; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #2c2416;
    color: #fff;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; }

  /* Responsive */
  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; height: auto; }
    .panel { max-height: 600px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📦 产品富文本生成器</h1>
  <span class="badge">7 区块模板 · zeveau</span>
</div>

<div class="container">

  <!-- LEFT: Inputs -->
  <div class="panel">
    <div class="panel-header">📝 填入产品内容</div>
    <div class="panel-body">
      <div class="field">
        <label>产品英文描述</label>
        <textarea id="desc" placeholder="These minimalist flat shoes combine a sleek square-toe silhouette..."></textarea>
        <span class="hint">→ What Makes This Special 区块</span>
      </div>

      <div class="field">
        <label>产品卖点（每行一条）</label>
        <textarea id="sells" placeholder="Minimalist Elegance: Clean square-toe styling...
Soft Comfort Fit: Flexible slip-on structure...
Secure Heel Design: Gathered heel construction...
Everyday Versatility: Perfect for commuting..."></textarea>
        <span class="hint">→ The Reasons to Choose It 区块 · 每条自动包裹 &lt;li&gt;</span>
      </div>

      <div class="field">
        <label>产品规格（每行一条）</label>
        <textarea id="specs" placeholder="Heel Style: Flat
Sole Material: Rubber
Lining Material: Leather
Toe Style: Square Toe
Upper Material: Leather
Style: Vintage
Shoe Style: Loafers"></textarea>
        <span class="hint">→ Key Specifications 区块 · 每条自动包裹 &lt;li&gt;</span>
      </div>



      <div class="btn-row">
        <button class="btn danger" onclick="clearAll()">清空</button>
        <button class="btn" onclick="loadExample()">加载示例</button>
      </div>
    </div>
  </div>

  <!-- RIGHT: Output -->
  <div class="panel">
    <div class="output-tabs">
      <button class="output-tab active" onclick="switchTab('html')">HTML 源码</button>
      <button class="output-tab" onclick="switchTab('preview')">预览</button>
    </div>

    <div id="tab-html" class="output-content active">
      <div class="code-block" id="output"></div>
      <div class="copy-bar">
        <span class="status" id="copyStatus">自动生成 · 实时更新</span>
        <button class="btn primary" onclick="copyHTML()">📋 复制 HTML</button>
      </div>
    </div>

    <div id="tab-preview" class="output-content">
      <iframe class="preview-frame" id="previewFrame"></iframe>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// --- Fixed template blocks ---
const BEFORE_DESC = '<p><strong>What Makes This Special</strong></p>\n';
const AFTER_DESC = '</p>\n';

const BEFORE_SELLS = '\n<p><strong>The Reasons to Choose It</strong></p>\n<ul>\n';
const AFTER_SELLS = '</ul>\n';

const BLOCK_CRAFTED = '\n<p><strong>Crafted Details Up Close</strong></p>\n';
const BLOCK_VISUAL = '\n<p><strong>Visual Experience</strong></p>\n';
const BLOCK_EXPLORE = '\n<p><strong>Explore Your Options</strong></p>\n';

const BEFORE_SPECS = '\n<p><strong>Key Specifications</strong></p>\n<ul>\n';
const AFTER_SPECS = '</ul>\n';

const BLOCK_LOVED = '\n<p><strong><span class="title-text">Loved by Our Customers</span></strong></p>\n';
const BLOCK_INSPIRE = '\n<p><strong><span>Designed to Inspire Spaces</span></strong></p>\n';

const NOTES = `
<p><strong>Important Notes</strong></p>
<ul>
<li class="p1">If you have any problems with the products, please contact us<span>&nbsp;</span><span data-type="text">and we will get back to you within 24 hours.</span></li>
<li class="p1">Please note and understand: Due to the different monitors and measurement methods, color and measurement differences are inevitable.</li>
<li>Please refer to the size chart before placing your order.</li>
</ul>`;

function makeImg() {
  return `<p><img style="max-width: 100%;" src="" width="600" /></p>\n`;
}

function generate() {
  const desc = document.getElementById('desc').value.trim();
  const sellsRaw = document.getElementById('sells').value.trim();
  const specsRaw = document.getElementById('specs').value.trim();

  function toLi(text) {
    if (!text) return '';
    return text.split('\n')
      .map(l => l.trim())
      .filter(l => l)
      .map(l => `<li>${l}</li>`)
      .join('\n');
  }

  let html = BEFORE_DESC;
  html += `<p>${desc || '（请填入产品描述）'}</p>\n`;
  html += makeImg();

  html += BEFORE_SELLS;
  html += toLi(sellsRaw) || '<li>（请填入卖点）</li>';
  html += '\n' + AFTER_SELLS;
  html += makeImg();

  html += BLOCK_CRAFTED;
  html += makeImg();

  html += BLOCK_VISUAL;
  html += makeImg();

  html += BLOCK_EXPLORE;
  html += makeImg();

  html += BEFORE_SPECS;
  html += toLi(specsRaw) || '<li>（请填入规格）</li>';
  html += '\n' + AFTER_SPECS;

  html += BLOCK_LOVED;
  html += makeImg();

  html += BLOCK_INSPIRE;
  html += makeImg();

  html += NOTES;

  document.getElementById('output').textContent = html;

  // Update preview
  const frame = document.getElementById('previewFrame');
  const previewDoc = frame.contentDocument || frame.contentWindow.document;
  previewDoc.open();
  previewDoc.write(`
    <html><head><style>
      body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 20px auto; padding: 0 16px; color: #2c2416; line-height: 1.7; }
      img { max-width: 100%; height: auto; border-radius: 4px; margin: 12px 0; }
      ul { padding-left: 20px; }
      li { margin-bottom: 6px; }
      strong { font-size: 16px; display: block; margin: 24px 0 8px; }
      .title-text { }
      .p1 { }
    </style></head><body>${html}</body></html>
  `);
  previewDoc.close();
}

function switchTab(tab) {
  document.querySelectorAll('.output-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.output-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`.output-tab:nth-child(${tab === 'html' ? 1 : 2})`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
  if (tab === 'preview') generate();
}

function copyHTML() {
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    showToast('✅ HTML 已复制到剪贴板');
    document.getElementById('copyStatus').innerHTML = '<span class="copied">已复制 ✓</span>';
    setTimeout(() => { document.getElementById('copyStatus').textContent = '自动生成 · 实时更新'; }, 2000);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function clearAll() {
  document.getElementById('desc').value = '';
  document.getElementById('sells').value = '';
  document.getElementById('specs').value = '';
  generate();
  showToast('已清空');
}

function loadExample() {
  document.getElementById('desc').value = "These minimalist flat shoes combine a sleek square-toe silhouette with a soft structured upper for a refined everyday look. Designed with a flexible slip-on construction and lightweight comfort sole, they provide lasting support for commuting, office wear, travel, and casual styling. The gathered heel detail enhances fit while adding a modern fashion touch.";
  document.getElementById('sells').value = "Minimalist Elegance: Clean square-toe styling creates a modern and versatile look.\nSoft Comfort Fit: Flexible slip-on structure offers lightweight all-day comfort.\nSecure Heel Design: Gathered heel construction improves fit and walking stability.\nEveryday Versatility: Perfect for commuting, office wear, travel, and casual outfits.";
  document.getElementById('specs').value = "Heel Style: Flat\nSole Material: Rubber\nLining Material: Leather\nToe Style: Square Toe\nUpper Material: Leather\nStyle: Vintage\nShoe Style: Loafers";
  generate();
  showToast('已加载示例数据');
}

// Auto-generate on input (debounced)
let debounceTimer;
document.querySelectorAll('textarea, input').forEach(el => {
  el.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(generate, 300);
  });
});

// Initial
generate();
</script>

</body>
</html>
